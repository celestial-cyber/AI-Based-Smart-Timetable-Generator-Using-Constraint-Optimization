<!DOCTYPE html>
<html>

<head>
    <title>Room Management</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
            background:#f4f6f9;
        }

        h1{
            color:#333;
        }

        form{
            background:white;
            padding:20px;
            width:400px;
            border-radius:8px;
            box-shadow:0px 0px 10px lightgray;
            margin-bottom:30px;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#0056b3;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        table,th,td{
            border:1px solid #ccc;
        }

        th,td{
            padding:12px;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
        }

        a{
            text-decoration:none;
            color:red;
        }
    </style>

</head>

<body>

<h1>Room Management</h1>

<form method="POST">

    <label>Room Name</label>

    <input
        type="text"
        name="room_name"
        maxlength="50"
        required
    >

    <label>Room Type</label>

    <select
        name="room_type"
        required
    >
        <option value="">Select</option>
        <option value="classroom">Classroom</option>
        <option value="lab">Lab</option>
    </select>

    <label>Capacity</label>

    <input
        type="number"
        name="capacity"
        min="1"
        required
    >

    <button type="submit">
        Add Room
    </button>

</form>

<h2>Available Rooms</h2>

<table>

<tr>
    <th>ID</th>
    <th>Room Name</th>
    <th>Room Type</th>
    <th>Capacity</th>
    <th>Action</th>
</tr>

{% for room in rooms %}

<tr>

    <td>{{ room[0] }}</td>
    <td>{{ room[1] }}</td>
    <td>{{ room[2] }}</td>
    <td>{{ room[3] }}</td>

    <td>

        <a href="/rooms/delete/{{ room[0] }}"
           onclick="return confirm('Delete this room?')">
            Delete
        </a>

    </td>

</tr>

{% endfor %}

</table>

</body>

</html>
